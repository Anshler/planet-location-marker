<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mars Direction Globe (Accurate around 2025)</title>
<link rel="icon" href="data:,">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000814;
    font-family:system-ui,-apple-system,sans-serif;
}
canvas{display:block;}
#ui{
    position:absolute;
    top:20px;
    left:20px;
    width:360px;
    backdrop-filter:blur(12px);
    background:rgba(20,25,35,0.85);
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.card-header{
    background:transparent;
    border-bottom:1px solid rgba(255,255,255,0.08);
    font-weight:600;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    cursor:pointer;
    user-select:none;
}
.card-header:hover{
    background:rgba(255,255,255,0.04);
}
#toggleBtn{
    background:none;
    border:none;
    color:#9da5b4;
    font-size:1.1rem;
    line-height:1;
    padding:0 2px;
    cursor:pointer;
}
#collapseBody{
    transition:none;
}
.form-control,.form-select{
    background:#161b22;
    border:1px solid #30363d;
    color:#fff;
}
#coords{
    font-size:0.85rem;
    color:#9da5b4;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="ui" class="card text-white">
<div class="card-header" id="cardHeader">
  <span>Mars Direction Controls</span>
  <button id="toggleBtn" title="Toggle controls">&#9776;</button>
</div>
<div id="collapseBody">
<div class="card-body">

<div class="mb-3">
<label class="form-label">Search Location</label>
<div class="input-group">
<input type="text" id="searchBox" class="form-control" placeholder="e.g. Tokyo">
<button id="searchBtn" class="btn btn-primary">Search</button>
</div>
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" id="dateInput" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Time</label>
<input type="time" id="timeInput" step="1" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Timezone</label>
<select id="timezoneSelect" class="form-select"></select>
</div>

<div class="mb-3">
<label class="form-label">Earth Transparency</label>
<input type="range" id="opacitySlider" class="form-range" min="0.1" max="1" step="0.05" value="1">
</div>

<div id="coords" class="pt-2 border-top">
<div id="earthCoords">Lat: -, Lon: -</div>
<div id="marsCoords">Mars: -</div>
</div>

</div>
</div>
</div>

<script>
const cardHeader = document.getElementById('cardHeader');
const collapseBody = document.getElementById('collapseBody');
cardHeader.addEventListener('click', () => {
    collapseBody.style.display = collapseBody.style.display === 'none' ? '' : 'none';
});
</script>

<script type="module">
import { camera, renderer, composer, controls } from './js/scene.js';
import './js/ui.js';

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    composer.render();
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
