<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mars Direction Globe (Accurate around 2025)</title>
<link rel="icon" href="data:,">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000814;
    font-family:system-ui,-apple-system,sans-serif;
}
canvas{display:block;}
#ui{
    position:absolute;
    top:20px;
    left:20px;
    width:360px;
    backdrop-filter:blur(12px);
    background:rgba(20,25,35,0.85);
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.card-header{
    background:transparent;
    border-bottom:1px solid rgba(255,255,255,0.08);
    font-weight:600;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    cursor:pointer;
    user-select:none;
}
.card-header:hover{
    background:rgba(255,255,255,0.04);
}
#toggleBtn{
    background:none;
    border:none;
    color:#9da5b4;
    font-size:1.1rem;
    line-height:1;
    padding:0 2px;
    cursor:pointer;
}
#collapseBody{
    transition:none;
}
.form-control,.form-select{
    background:#161b22;
    border:1px solid #30363d;
    color:#fff;
}
#tlFromInput, #tlToInput, #tlDuration {
    background:#161b22;
    border:1px solid #30363d;
    color:#fff;
}
#tlFromInput, #tlToInput, #dateTimeInput {
    color-scheme: dark;
}
#coords{
    font-size:0.85rem;
    color:#9da5b4;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="ui" class="card text-white">
<div class="card-header" id="cardHeader">
  <span>Mars Direction Controls</span>
  <button id="toggleBtn" title="Toggle controls">&#9776;</button>
</div>
<div id="collapseBody">
<div class="card-body">

<div class="mb-3">
<label class="form-label">Search Location</label>
<div class="input-group">
<input type="text" id="searchBox" class="form-control" placeholder="e.g. Tokyo">
<button id="searchBtn" class="btn btn-primary">Search</button>
</div>
</div>

<div class="mb-2">
  <button id="animToggleBtn" class="btn btn-sm btn-outline-secondary w-100">&#9654; Animation</button>
</div>

<div id="animControls" style="display:none" class="mb-2">
  <div class="btn-group w-100 mb-2" role="group" aria-label="Animation mode">
    <input type="radio" class="btn-check" name="animMode" id="modeRealtime" value="realtime" autocomplete="off" checked>
    <label class="btn btn-sm btn-outline-secondary" for="modeRealtime">Realtime</label>
    <input type="radio" class="btn-check" name="animMode" id="modeTimelapse" value="timelapse" autocomplete="off">
    <label class="btn btn-sm btn-outline-secondary" for="modeTimelapse">Timelapse</label>
  </div>

  <div id="tlDateRange" style="display:none">
    <div class="row g-2 mb-2">
      <div class="col">
        <label for="tlFromInput" class="form-label">From</label>
        <input type="datetime-local" id="tlFromInput" class="form-control">
      </div>
      <div class="col">
        <label for="tlToInput" class="form-label">To</label>
        <input type="datetime-local" id="tlToInput" class="form-control">
      </div>
    </div>
    <div class="mb-2">
      <label for="tlDuration" class="form-label">Duration (s)</label>
      <input type="number" id="tlDuration" class="form-control" value="10" min="1">
    </div>
  </div>

  <div class="d-flex align-items-center gap-2">
    <button id="animPlayBtn" class="btn btn-sm btn-primary" style="min-width:38px" disabled>&#9654;</button>
    <input type="range" id="animSlider" class="form-range" min="0" max="100" value="0" disabled style="opacity:0.35; pointer-events:none">
  </div>
</div>

<div class="mb-3">
<label for="dateTimeInput" class="form-label">Date &amp; Time</label>
<input type="datetime-local" id="dateTimeInput" step="1" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Timezone</label>
<select id="timezoneSelect" class="form-select"></select>
</div>

<div class="mb-3">
<label class="form-label">Earth Transparency</label>
<input type="range" id="opacitySlider" class="form-range" min="0.1" max="1" step="0.05" value="1">
</div>

<div id="coords" class="pt-2 border-top">
<div id="earthCoords">Lat: -, Lon: -</div>
<div id="marsCoords">Mars: -</div>
</div>

</div>
</div>
</div>

<script>
const cardHeader = document.getElementById('cardHeader');
const collapseBody = document.getElementById('collapseBody');
cardHeader.addEventListener('click', () => {
    collapseBody.style.display = collapseBody.style.display === 'none' ? '' : 'none';
});
</script>

<script type="module">
import { camera, renderer, composer, controls } from './js/scene.js';
import './js/ui.js';
import './js/animation.js';

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    composer.render();
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
